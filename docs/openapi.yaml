openapi: 3.0.3
info:
  title: Flight Manifest API
  version: 0.4.0
  description: API for managing flights, passengers, and reservations.
servers:
  - url: http://localhost
tags:
  - name: Health
  - name: Flights
  - name: Passengers
  - name: Reservations
paths:
  /api/health:
    get:
      tags: [Health]
      summary: Health check
      responses:
        '200':
          description: API is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              example:
                status: ok
  /api/flights:
    get:
      tags: [Flights]
      summary: List flights
      responses:
        '200':
          description: List of flights
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlightCollectionResponse'
    post:
      tags: [Flights]
      summary: Create flight
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StoreFlightRequest'
            example:
              flight_number: PS321
              origin: KBP
              destination: AMS
              departure_at: '2026-05-10 10:30:00'
              status: scheduled
      responses:
        '201':
          description: Flight created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlightResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
  /api/flights/{id}:
    get:
      tags: [Flights]
      summary: Get flight by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Flight details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlightResponse'
        '404':
          description: Flight not found
  /api/flights/{id}/sync-status:
    post:
      tags: [Flights]
      summary: Sync flight status from external airline service
      description: >
        Calls a mock external airline API and updates the flight status,
        departure_at, and optional gate.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Flight was synced successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlightResponse'
              example:
                data:
                  id: 1
                  flight_number: PS101
                  origin: KBP
                  destination: WAW
                  gate: A12
                  departure_at: '2026-04-24T11:45:00+00:00'
                  departed_at: null
                  status: boarding
                  created_at: '2026-04-22T12:00:00+00:00'
                  updated_at: '2026-04-23T08:50:00+00:00'
        '502':
          description: External airline service failed
          content:
            application/json:
              schema:
                type: object
                required: [message]
                properties:
                  message:
                    type: string
                    example: Unable to sync flight status from external airline service.
  /api/flights/{id}/reservations:
    post:
      tags: [Reservations]
      summary: Create reservation for a flight
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StoreReservationRequest'
            example:
              passenger_id: 5
              seat_number: 12C
      responses:
        '201':
          description: Reservation created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReservationResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
  /api/flights/{id}/manifest:
    get:
      tags: [Reservations]
      summary: Get passenger manifest for a flight
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Flight manifest
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlightManifestResponse'
        '404':
          description: Flight not found
  /api/passengers:
    post:
      tags: [Passengers]
      summary: Create passenger
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StorePassengerRequest'
            example:
              first_name: Iryna
              last_name: Melnyk
              email: iryna.melnyk@example.test
              birthday: '1995-08-14'
              document_number: AB123456
      responses:
        '201':
          description: Passenger created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PassengerResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
  /api/passengers/{id}:
    get:
      tags: [Passengers]
      summary: Get passenger by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Passenger details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PassengerResponse'
        '404':
          description: Passenger not found
  /api/reservations/{id}:
    get:
      tags: [Reservations]
      summary: Get reservation by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Reservation details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReservationResponse'
        '404':
          description: Reservation not found
  /api/reservations/{id}/check-in:
    post:
      tags: [Reservations]
      summary: Check in a reservation
      description: >
        Changes reservation status from booked to checked_in, sets checked_in_at,
        and queues asynchronous boarding pass generation.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Reservation checked in
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReservationResponse'
              example:
                data:
                  id: 9
                  seat_number: 12C
                  status: checked_in
                  checked_in_at: '2026-04-22T12:05:00+00:00'
                  boarding_pass_code: PS555-12C-A1B2C3
                  flight:
                    id: 1
                    flight_number: PS555
                    status: scheduled
                    departure_at: '2026-05-10T10:30:00+00:00'
                  passenger:
                    id: 5
                    first_name: Iryna
                    last_name: Melnyk
                    email: iryna.melnyk@example.test
                    document_number: AB123456
                  created_at: '2026-04-22T12:00:00+00:00'
                  updated_at: '2026-04-22T12:05:00+00:00'
        '422':
          description: Reservation cannot be checked in
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
  /api/reservations/{id}/cancel:
    post:
      tags: [Reservations]
      summary: Cancel a reservation
      description: Changes reservation status from booked or checked_in to cancelled.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Reservation cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReservationResponse'
              example:
                data:
                  id: 9
                  seat_number: 12C
                  status: cancelled
                  checked_in_at: '2026-04-22T12:05:00+00:00'
                  boarding_pass_code: null
                  flight:
                    id: 1
                    flight_number: PS555
                    status: scheduled
                    departure_at: '2026-05-10T10:30:00+00:00'
                  passenger:
                    id: 5
                    first_name: Iryna
                    last_name: Melnyk
                    email: iryna.melnyk@example.test
                    document_number: AB123456
                  created_at: '2026-04-22T12:00:00+00:00'
                  updated_at: '2026-04-22T12:06:00+00:00'
        '422':
          description: Reservation cannot be cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
components:
  schemas:
    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: ok
    StoreFlightRequest:
      type: object
      required:
        - flight_number
        - origin
        - destination
        - departure_at
        - status
      properties:
        flight_number:
          type: string
          example: PS321
        origin:
          type: string
          minLength: 3
          maxLength: 3
          example: KBP
        destination:
          type: string
          minLength: 3
          maxLength: 3
          example: AMS
        departure_at:
          type: string
          format: date-time
          description: Must be in the future.
          example: '2026-05-10T10:30:00Z'
        status:
          type: string
          enum: [scheduled, boarding, departed, delayed, cancelled]
        departed_at:
          type: string
          format: date-time
          nullable: true
    Flight:
      type: object
      required:
        - id
        - flight_number
        - origin
        - destination
        - departure_at
        - status
        - created_at
        - updated_at
      properties:
        id:
          type: integer
          example: 1
        flight_number:
          type: string
          example: PS321
        origin:
          type: string
          example: KBP
        destination:
          type: string
          example: AMS
        gate:
          type: string
          nullable: true
          example: A12
        departure_at:
          type: string
          format: date-time
          example: '2026-05-10T10:30:00+00:00'
        departed_at:
          type: string
          format: date-time
          nullable: true
          example: null
        status:
          type: string
          enum: [scheduled, boarding, departed, delayed, cancelled]
        created_at:
          type: string
          format: date-time
          example: '2026-04-22T12:00:00+00:00'
        updated_at:
          type: string
          format: date-time
          example: '2026-04-22T12:00:00+00:00'
    FlightResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/Flight'
    FlightCollectionResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Flight'
    StoreReservationRequest:
      type: object
      required:
        - passenger_id
        - seat_number
      properties:
        passenger_id:
          type: integer
          example: 5
        seat_number:
          type: string
          pattern: '^(?:[1-9]|[1-2][0-9]|3[0-6])[A-F]$'
          example: 12C
      description: >
        Cancelled reservations do not block rebooking the same seat or the same
        passenger on the same flight.
    StorePassengerRequest:
      type: object
      required:
        - first_name
        - last_name
        - email
        - birthday
        - document_number
      properties:
        first_name:
          type: string
          example: Iryna
        last_name:
          type: string
          example: Melnyk
        email:
          type: string
          format: email
          example: iryna.melnyk@example.test
        birthday:
          type: string
          format: date
          example: '1995-08-14'
        document_number:
          type: string
          example: AB123456
    Passenger:
      type: object
      required:
        - id
        - first_name
        - last_name
        - email
        - birthday
        - document_number
        - created_at
        - updated_at
      properties:
        id:
          type: integer
          example: 1
        first_name:
          type: string
          example: Iryna
        last_name:
          type: string
          example: Melnyk
        email:
          type: string
          format: email
          example: iryna.melnyk@example.test
        birthday:
          type: string
          format: date
          example: '1995-08-14'
        document_number:
          type: string
          example: AB123456
        created_at:
          type: string
          format: date-time
          example: '2026-04-22T12:00:00+00:00'
        updated_at:
          type: string
          format: date-time
          example: '2026-04-22T12:00:00+00:00'
    PassengerResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/Passenger'
    ReservationFlightSummary:
      type: object
      required:
        - id
        - flight_number
        - status
        - departure_at
      properties:
        id:
          type: integer
          example: 1
        flight_number:
          type: string
          example: PS555
        status:
          type: string
          enum: [scheduled, boarding, departed, delayed, cancelled]
        departure_at:
          type: string
          format: date-time
          example: '2026-05-10T10:30:00+00:00'
    ManifestPassenger:
      type: object
      required:
        - id
        - first_name
        - last_name
        - email
        - document_number
      properties:
        id:
          type: integer
          example: 5
        first_name:
          type: string
          example: Iryna
        last_name:
          type: string
          example: Melnyk
        email:
          type: string
          format: email
          example: iryna.melnyk@example.test
        document_number:
          type: string
          example: AB123456
    Reservation:
      type: object
      required:
        - id
        - seat_number
        - status
        - flight
        - passenger
        - created_at
        - updated_at
      properties:
        id:
          type: integer
          example: 9
        seat_number:
          type: string
          example: 12C
        status:
          type: string
          enum: [booked, checked_in, cancelled]
        checked_in_at:
          type: string
          format: date-time
          nullable: true
          example: null
        boarding_pass_code:
          type: string
          nullable: true
          example: null
        flight:
          $ref: '#/components/schemas/ReservationFlightSummary'
        passenger:
          $ref: '#/components/schemas/ManifestPassenger'
        created_at:
          type: string
          format: date-time
          example: '2026-04-22T12:00:00+00:00'
        updated_at:
          type: string
          format: date-time
          example: '2026-04-22T12:00:00+00:00'
    ReservationResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/Reservation'
    ManifestReservation:
      type: object
      required:
        - id
        - seat_number
        - status
        - passenger
      properties:
        id:
          type: integer
          example: 9
        seat_number:
          type: string
          example: 12A
        status:
          type: string
          enum: [booked, checked_in, cancelled]
        passenger:
          $ref: '#/components/schemas/ManifestPassenger'
    ManifestFlight:
      type: object
      required:
        - id
        - flight_number
        - origin
        - destination
        - departure_at
        - status
      properties:
        id:
          type: integer
          example: 1
        flight_number:
          type: string
          example: PS555
        origin:
          type: string
          example: KBP
        destination:
          type: string
          example: AMS
        departure_at:
          type: string
          format: date-time
          example: '2026-05-10T10:30:00+00:00'
        departed_at:
          type: string
          format: date-time
          nullable: true
          example: null
        status:
          type: string
          enum: [scheduled, boarding, departed, delayed, cancelled]
    FlightManifest:
      type: object
      required:
        - flight
        - reservations
      properties:
        flight:
          $ref: '#/components/schemas/ManifestFlight'
        reservations:
          type: array
          items:
            $ref: '#/components/schemas/ManifestReservation'
    FlightManifestResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/FlightManifest'
    ValidationErrorResponse:
      type: object
      required: [message, errors]
      properties:
        message:
          type: string
          example: The given data was invalid.
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string

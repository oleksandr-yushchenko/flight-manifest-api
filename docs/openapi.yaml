openapi: 3.0.3
info:
  title: Flight Manifest API
  version: 0.2.0
  description: API for managing flights, passengers, and reservations.
servers:
  - url: http://localhost
tags:
  - name: Health
  - name: Flights
  - name: Passengers
paths:
  /api/health:
    get:
      tags: [Health]
      summary: Health check
      responses:
        '200':
          description: API is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              example:
                status: ok
  /api/flights:
    get:
      tags: [Flights]
      summary: List flights
      responses:
        '200':
          description: List of flights
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlightCollectionResponse'
    post:
      tags: [Flights]
      summary: Create flight
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StoreFlightRequest'
            example:
              flight_number: PS321
              origin: KBP
              destination: AMS
              departure_at: '2026-05-10 10:30:00'
              status: scheduled
      responses:
        '201':
          description: Flight created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlightResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
  /api/flights/{id}:
    get:
      tags: [Flights]
      summary: Get flight by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Flight details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlightResponse'
        '404':
          description: Flight not found
  /api/passengers:
    post:
      tags: [Passengers]
      summary: Create passenger
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StorePassengerRequest'
            example:
              first_name: Iryna
              last_name: Melnyk
              email: iryna.melnyk@example.test
              birthday: '1995-08-14'
              document_number: AB123456
      responses:
        '201':
          description: Passenger created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PassengerResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
  /api/passengers/{id}:
    get:
      tags: [Passengers]
      summary: Get passenger by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Passenger details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PassengerResponse'
        '404':
          description: Passenger not found
components:
  schemas:
    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: ok
    StoreFlightRequest:
      type: object
      required:
        - flight_number
        - origin
        - destination
        - departure_at
        - status
      properties:
        flight_number:
          type: string
          example: PS321
        origin:
          type: string
          minLength: 3
          maxLength: 3
          example: KBP
        destination:
          type: string
          minLength: 3
          maxLength: 3
          example: AMS
        departure_at:
          type: string
          format: date-time
          description: Must be in the future.
          example: '2026-05-10T10:30:00Z'
        status:
          type: string
          enum: [scheduled, boarding, departed, delayed, cancelled]
        departed_at:
          type: string
          format: date-time
          nullable: true
    Flight:
      type: object
      required:
        - id
        - flight_number
        - origin
        - destination
        - departure_at
        - status
        - created_at
        - updated_at
      properties:
        id:
          type: integer
          example: 1
        flight_number:
          type: string
          example: PS321
        origin:
          type: string
          example: KBP
        destination:
          type: string
          example: AMS
        departure_at:
          type: string
          format: date-time
          example: '2026-05-10T10:30:00+00:00'
        departed_at:
          type: string
          format: date-time
          nullable: true
          example: null
        status:
          type: string
          enum: [scheduled, boarding, departed, delayed, cancelled]
        created_at:
          type: string
          format: date-time
          example: '2026-04-22T12:00:00+00:00'
        updated_at:
          type: string
          format: date-time
          example: '2026-04-22T12:00:00+00:00'
    FlightResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/Flight'
    FlightCollectionResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Flight'
    StorePassengerRequest:
      type: object
      required:
        - first_name
        - last_name
        - email
        - birthday
        - document_number
      properties:
        first_name:
          type: string
          example: Iryna
        last_name:
          type: string
          example: Melnyk
        email:
          type: string
          format: email
          example: iryna.melnyk@example.test
        birthday:
          type: string
          format: date
          example: '1995-08-14'
        document_number:
          type: string
          example: AB123456
    Passenger:
      type: object
      required:
        - id
        - first_name
        - last_name
        - email
        - birthday
        - document_number
        - created_at
        - updated_at
      properties:
        id:
          type: integer
          example: 1
        first_name:
          type: string
          example: Iryna
        last_name:
          type: string
          example: Melnyk
        email:
          type: string
          format: email
          example: iryna.melnyk@example.test
        birthday:
          type: string
          format: date
          example: '1995-08-14'
        document_number:
          type: string
          example: AB123456
        created_at:
          type: string
          format: date-time
          example: '2026-04-22T12:00:00+00:00'
        updated_at:
          type: string
          format: date-time
          example: '2026-04-22T12:00:00+00:00'
    PassengerResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/Passenger'
    ValidationErrorResponse:
      type: object
      required: [message, errors]
      properties:
        message:
          type: string
          example: The given data was invalid.
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
